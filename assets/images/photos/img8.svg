<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bfdbfe;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="#f8f9fa" rx="20" ry="20"/>
  
  <text x="400" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#333">Budget Allocation</text>
  
  <!-- Pie chart -->
  <g transform="translate(400, 300)">
    <!-- 80% Direct Teaching -->
    <path d="M0,0 L200,0 A200,200 0 0,1 -161.8,117.6 L0,0" fill="url(#grad1)"/>
    
    <!-- 10% Equipment -->
    <path d="M0,0 L-161.8,117.6 A200,200 0 0,1 -200,0 L0,0" fill="url(#grad2)"/>
    
    <!-- 5% Administration -->
    <path d="M0,0 L-200,0 A200,200 0 0,1 -117.6,-161.8 L0,0" fill="url(#grad3)"/>
    
    <!-- 5% Contingency -->
    <path d="M0,0 L-117.6,-161.8 A200,200 0 0,1 0,-200 L0,0" fill="url(#grad4)"/>
  </g>
  
  <!-- Legend -->
  <g transform="translate(500, 150)">
    <rect x="0" y="0" width="20" height="20" fill="url(#grad1)" rx="4" ry="4"/>
    <text x="30" y="15" font-family="Arial, sans-serif" font-size="18" fill="#333">80% Direct Teaching</text>
    
    <rect x="0" y="40" width="20" height="20" fill="url(#grad2)" rx="4" ry="4"/>
    <text x="30" y="55" font-family="Arial, sans-serif" font-size="18" fill="#333">10% Equipment</text>
    
    <rect x="0" y="80" width="20" height="20" fill="url(#grad3)" rx="4" ry="4"/>
    <text x="30" y="95" font-family="Arial, sans-serif" font-size="18" fill="#333">5% Administration</text>
    
    <rect x="0" y="120" width="20" height="20" fill="url(#grad4)" rx="4" ry="4"/>
    <text x="30" y="135" font-family="Arial, sans-serif" font-size="18" fill="#333">5% Contingency</text>
  </g>
  
  <!-- Source text -->
  <text x="400" y="550" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#666" font-style="italic">
    Based on proposal: 80% of funds directly support swimming lessons
  </text>
</svg>